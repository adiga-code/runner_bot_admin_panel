server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API — prefixed path
    location /runneradmin/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy API — unprefixed (direct container access / fallback)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Redirect bare path without trailing slash
    location = /runneradmin {
        return 301 /runneradmin/;
    }

    # Serve SPA
    location /runneradmin/ {
        try_files $uri /runneradmin/index.html;
    }

    # Fallback for direct container access
    location / {
        try_files $uri /index.html;
    }
}
