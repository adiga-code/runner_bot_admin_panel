server {
    listen 80;
    server_name _;
    absolute_redirect off;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Redirect bare path without trailing slash
    location = /runneradmintest {
        return 301 /runneradmintest/;
    }

    # Serve app: strip /runneradmintest/ prefix via alias
    location /runneradmintest/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /runneradmintest/index.html;
    }

    # Fallback for direct container access
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
