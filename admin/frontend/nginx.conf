server {
    listen 80;
    server_name _;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Redirect bare path without trailing slash
    location = /runneradmintest {
        return 301 $scheme://$host/runneradmintest/;
    }

    # Serve app: strip /runneradmintest/ prefix, files are at html root
    location /runneradmintest/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /runneradmintest/index.html;

        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            alias /usr/share/nginx/html/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Fallback for direct container access on port 8082
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
