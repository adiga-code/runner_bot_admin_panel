server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Serve SPA — files are physically at html/runneradmintest/
    location /runneradmintest/ {
        try_files $uri /runneradmintest/index.html;
    }

    # Redirect bare path to trailing-slash version
    location = /runneradmintest {
        return 301 /runneradmintest/;
    }

    # Cache built assets
    location ~* /runneradmintest/assets/.*\.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
