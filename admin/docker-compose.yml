services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/mock.db
      SECRET_KEY: change-me-in-production
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: adminpassword
      JWT_EXPIRE_MINUTES: "1440"
    volumes:
      - db_data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
